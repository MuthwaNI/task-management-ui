<div class="container mt-5">

<h2>Register</h2>

<input class="form-control mb-3"
[(ngModel)]="user.username"
placeholder="Username">

<input class="form-control mb-3"
[(ngModel)]="user.email"
placeholder="Email">

<input class="form-control mb-3"
type="password"
[(ngModel)]="user.password"
placeholder="Password">

<button
class="btn btn-primary"
(click)="register()">

Register

</button>

</div>
